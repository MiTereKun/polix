<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сравнение 09.07.26</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f4f4f9; 
            height: 100vh; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .controls { 
            margin-bottom: 15px; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        button.add-btn { 
            background: #0088cc; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
        }
        button.add-btn:hover { background: #006699; }

        /* Контейнер столбиков: В РЯД */
        .columns-container { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            width: 100%; 
            flex-grow: 1; 
            overflow-x: auto; 
            overflow-y: hidden;
            align-items: stretch; 
            padding-bottom: 10px;
        }
        
        .column { 
            background: white; 
            width: 268px; 
            min-width: 268px; 
            max-width: 268px; 
            flex: 0 0 268px; 
            
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            height: 100%; 
            box-sizing: border-box;
        }

        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; flex-shrink: 0; }
        .radio-label { font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        
        .delete-col-btn { background: none; border: none; color: #999; font-size: 18px; cursor: pointer; padding: 0 5px; }
        .delete-col-btn:hover { color: #ff4d4d; }

        /* Поля ввода */
        .input-group { margin-bottom: 10px; flex-shrink: 0; }
        
        /* Сырое поле - ОДНА СТРОКА */
        input.raw-input { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-family: monospace; 
            font-size: 13px; 
            box-sizing: border-box; 
            background: #fffbe6; 
            border-color: #ffe58f;
        }

        textarea.clean-input { 
            width: 100%; 
            height: 60px; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            resize: none; 
            font-family: monospace; 
            font-size: 13px; 
            box-sizing: border-box; 
            background: #fff; 
            border-color: #b7eb8f;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        .copy-all-btn {
            width: 100%;
            padding: 6px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .copy-all-btn:hover { background: #e0e0e0; }
        .copy-all-btn.copied { background: #d4edda; color: #155724; border-color: #c3e6cb; }

        /* Список тегов */
        .tag-list-container {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .tag-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            height: 100%;
            overflow-y: auto; 
        }
        
        .tag-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 6px 8px; 
            margin: 0; 
            border-bottom: 1px solid #f0f0f0; 
            background: #fff; 
            font-size: 14px; 
            border-left: 4px solid transparent; 
        }
        .tag-item:last-child { border-bottom: none; }
        
        /* Цвета статусов */
        .status-present { border-left-color: #4caf50; background: #f6ffed; } /* Зеленый (Есть везде) */
        .status-missing { border-left-color: #f44336; background: #fff1f0; } /* Красный (Нет в эталоне) */
        .status-unique-ref { border-left-color: #faad14; background: #fff7e6; } /* Желтый (Только в эталоне) */
        .status-neutral { border-left-color: #ccc; } /* Серый (Нет эталона) */

        .tag-actions { display: flex; align-items: center; gap: 2px; }

        .delete-tag-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 16px; padding: 0 5px; }
        .delete-tag-btn:hover { color: #f44336; }

        /* Кнопки действий справа */
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0 2px;
            opacity: 0.7;
            transition: transform 0.1s;
        }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
        
        /* Ссылки */
        .tag-text a {
            color: #0088cc;
            text-decoration: none;
            border-bottom: 1px dashed #0088cc;
        }
        .tag-text a:hover { border-bottom: 1px solid #0088cc; }
    </style>
</head>
<body>

<div class="controls">
    <button class="add-btn" onclick="addColumn()">+ Добавить сравнение</button>
	<button class="add-btn" onclick="window.open('https://huggingface.co/spaces/hysts/DeepDanbooru', '_blank')">deepdanbooru</button>
</div>

<div class="columns-container" id="columnsContainer"></div>

<script>
    let columnCount = 0;
    let isSyncingScroll = false;

    // --- PYTHON FILTER LOGIC IN JS ---
    function cleanAndParseTags(rawText) {
        if (!rawText) return "";
        let data = rawText;

        const wordsToRemove = ["копирайт", "\\(продукт\\)", "ярлык", "reference", "object", "автор", "персонаж", "описание", "иной", "копирайт", "игровой", "копирайт", "объект", "artist", "copyright", "\\(product\\)", "character", "metadata", "tag", "game"];
        
        wordsToRemove.forEach(word => {
            let regex = new RegExp(word, 'gi');
            data = data.replace(regex, '');
        });

        data = data.replace(/\d+[kK]/g, '||'); 
        data = data.replace(/(?<!girls)\b\d+\b/g, '||');
        data = data.replace(/\r?\n/g, ''); 
        data = data.replace(/\?/g, ''); 
        data = data.replace(/%/g, ''); 
        data = data.replace(/_/g, ' '); 
        data = data.replace(/\s*\|\|\s*/g, '||');
        data = data.replace(/^(\|\|)+/, '').replace(/(\|\|)+$/, '');
		data = data.replace(/\s+/g, ' ').trim();

        return data;
    }

    // Преобразование текста в ссылки
    function linkify(text) {
        const urlRegex = /((https?:\/\/)?([\w\-]+\.)+[\w\-]{2,}(\/[^\s]*)?)/gi;
        return text.replace(urlRegex, function(url) {
            let href = url;
            if (!/^https?:\/\//i.test(url)) {
                href = 'https://' + url;
            }
            return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    function addColumn() {
        columnCount++;
        const container = document.getElementById('columnsContainer');
        const colDiv = document.createElement('div');
        colDiv.className = 'column';
        colDiv.id = `col-${columnCount}`;

        // Первый столбик всегда эталон
        const isFirst = columnCount === 1;
        const checkedAttr = isFirst ? 'checked' : '';

        colDiv.innerHTML = `
            <div class="col-header">
                <label class="radio-label">
                    <input type="radio" name="referenceCol" value="${columnCount}" ${checkedAttr} onchange="updateAllColumns()">
                    Эталон
                </label>
                <button class="delete-col-btn" onclick="removeColumn(${columnCount})" title="Удалить столбец">✕</button>
            </div>
            
            <div class="input-group">
                <input type="text" class="raw-input" placeholder="Сырые теги" oninput="handleRawInput(${columnCount})">
            </div>

            <textarea class="clean-input" placeholder="Чистые теги" oninput="handleCleanInput(${columnCount})"></textarea>
            
            <button class="copy-all-btn" onclick="copyAllTags(${columnCount}, this)">📋 Копировать все</button>

            <div class="tag-list-container">
                <ul class="tag-list" id="list-${columnCount}" onscroll="syncScroll(this, ${columnCount})"></ul>
            </div>
        `;
        container.appendChild(colDiv);
    }

    function removeColumn(id) {
        const col = document.getElementById(`col-${id}`);
        if (col) col.remove();
        updateAllColumns();
    }

    function handleRawInput(colId) {
        const colDiv = document.getElementById(`col-${colId}`);
        const rawInput = colDiv.querySelector('.raw-input');
        const cleanTextarea = colDiv.querySelector('.clean-input');
        
        const cleaned = cleanAndParseTags(rawInput.value);
        cleanTextarea.value = cleaned;
        
        // При вводе в сырое поле обновляем ВСЕ столбики, так как изменился состав тегов
        updateAllColumns();
    }

    function handleCleanInput(colId) {
         updateAllColumns();
    }
	
	function copyAllTags(colId, btn) {
        const colDiv = document.getElementById(`col-${colId}`);
        const cleanTextarea = colDiv.querySelector('.clean-input');
        
        navigator.clipboard.writeText(cleanTextarea.value).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "✅ Скопировано";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 2000);
        });
    }

        function renderList(colId, rawText) {
        const list = document.getElementById(`list-${colId}`);
        const tags = rawText.split('||').map(t => t.trim()).filter(t => t.length > 0);
        
        const refRadio = document.querySelector(`input[name="referenceCol"]:checked`);
        let refTags = [];
        let refColId = null;
        let allOtherTags = []; 
        
        if (refRadio) {
            refColId = parseInt(refRadio.value);
            const refCol = document.getElementById(`col-${refColId}`);
            if (refCol) {
                const refCleanTextarea = refCol.querySelector('.clean-input');
                if (refCleanTextarea) {
                    refTags = refCleanTextarea.value.split('||').map(t => t.trim()).filter(t => t.length > 0);
                }
            }
            
            // Собираем теги из ВСЕХ остальных столбцов
            for (let i = 1; i <= columnCount; i++) {
                if (i !== colId && i !== refColId) {
                    const otherCol = document.getElementById(`col-${i}`);
                    if (otherCol) {
                        const otherText = otherCol.querySelector('.clean-input').value;
                        const otherArr = otherText.split('||').map(t => t.trim()).filter(t => t.length > 0);
                        allOtherTags = allOtherTags.concat(otherArr);
                    }
                }
            }
        }

        tags.sort((a, b) => {
            let statusA = 'neutral';
            if (refTags.length > 0 && refColId !== null) {
                if (colId === refColId) {
                    statusA = !allOtherTags.includes(a) ? 'unique' : 'present';
                } else {
                    statusA = refTags.includes(a) ? 'present' : 'missing';
                }
            }

            let statusB = 'neutral';
            if (refTags.length > 0 && refColId !== null) {
                if (colId === refColId) {
                    statusB = !allOtherTags.includes(b) ? 'unique' : 'present';
                } else {
                    statusB = refTags.includes(b) ? 'present' : 'missing';
                }
            }
            
            const priorityA = (statusA === 'present') ? 1 : 0;
            const priorityB = (statusB === 'present') ? 1 : 0;

            return priorityA - priorityB;
        });

        const scrollPos = list.scrollTop;
        list.innerHTML = '';

        tags.forEach(tag => {
            const li = document.createElement('li');
            li.className = 'tag-item';
            
            let statusClass = 'status-neutral';
            
            // Логика статусов (та же, что и была, для правильного цвета)
            if (refTags.length > 0 && refColId !== null) {
                if (colId === refColId) {
                    if (!allOtherTags.includes(tag)) {
                        statusClass = 'status-unique-ref'; // Желтый
                    } else {
                        statusClass = 'status-present'; // Зеленый
                    }
                } else {
                    if (refTags.includes(tag)) {
                        statusClass = 'status-present'; // Зеленый
                    } else {
                        statusClass = 'status-missing'; // Красный
                    }
                }
            }

            li.classList.add(statusClass);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'tag-actions';
            
            // Кнопки действий
            if (statusClass === 'status-missing' && refColId !== null) {
                const addBtn = createButton('✅', 'Добавить в эталон', () => moveToReference(tag, colId, refColId));
                actionsDiv.appendChild(addBtn);
                const copyBtn = createButton('📋', 'Копировать тег', () => copySingleTag(tag));
                actionsDiv.appendChild(copyBtn);
            }
            
            if (colId === refColId) {
                 const copyBtn = createButton('📋', 'Копировать тег', () => copySingleTag(tag));
                 actionsDiv.appendChild(copyBtn);
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-tag-btn';
            delBtn.innerHTML = '🗑️';
            delBtn.onclick = () => {
                removeTagFromCol(colId, tag);
                updateAllColumns(); 
            };
            actionsDiv.appendChild(delBtn);

            li.innerHTML = `
                <span class="tag-text">${linkify(escapeHtml(tag))}</span>
            `;
            li.appendChild(actionsDiv);
            list.appendChild(li);
        });

        list.scrollTop = scrollPos;
    }

    function createButton(icon, title, onClick) {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.innerHTML = icon;
        btn.title = title;
        btn.onclick = onClick;
        return btn;
    }

    function copySingleTag(tag) {
        navigator.clipboard.writeText(tag).then(() => {
            console.log('Copied:', tag);
        });
    }

    // Функция КОПИРОВАНИЯ тега в эталон (без удаления из источника)
    function moveToReference(tag, fromColId, toColId) {
        const toCol = document.getElementById(`col-${toColId}`);
        if (!toCol) return;

        const toTextarea = toCol.querySelector('.clean-input');
        let toTags = toTextarea.value.split('||').map(t => t.trim()).filter(t => t.length > 0);
        
        if (!toTags.includes(tag)) {
            toTags.push(tag);
            toTextarea.value = toTags.join('||');
        }

        // Перерисовываем все, чтобы обновить цвета (тег станет зеленым везде)
        updateAllColumns();
    }

    function removeTagFromCol(colId, tagToRemove) {
        const colDiv = document.getElementById(`col-${colId}`);
        const cleanTextarea = colDiv.querySelector('.clean-input');
        
        let tags = cleanTextarea.value.split('||').map(t => t.trim()).filter(t => t.length > 0);
        
        const index = tags.indexOf(tagToRemove);
        if (index > -1) {
            tags.splice(index, 1);
            cleanTextarea.value = tags.join('||');
            // Раньше здесь был renderList(colId, ...), теперь это делает updateAllColumns()
        }
    }

    function updateAllColumns() {
        for (let i = 1; i <= columnCount; i++) {
            const col = document.getElementById(`col-${i}`);
            if (col) {
                const cleanTextarea = col.querySelector('.clean-input');
                renderList(i, cleanTextarea.value);
            }
        }
    }

    function syncScroll(sourceList, sourceColId) {
        if (isSyncingScroll) return;
        isSyncingScroll = true;

        const allLists = document.querySelectorAll('.tag-list');
        allLists.forEach(list => {
            if (list !== sourceList) {
                list.scrollTop = sourceList.scrollTop;
            }
        });

        isSyncingScroll = false;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    window.onload = () => {
        addColumn();
        addColumn();
    };
</script>
</body>
</html>
